name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml jsonschema pre-commit
      - name: Rules / workflows IDE copies in sync
        run: |
          python scripts/sync_workflows.py --check
          python scripts/sync_rules.py --check
      - name: Pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Content pipeline lint
        run: python scripts/pipeline_lint.py
        continue-on-error: true
